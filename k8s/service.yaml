apiVersion: v1
kind: Service
metadata:
  name: delivery-tracking-service
  namespace: delivery-app
  labels:
    app: delivery-tracking-system
spec:
  type: NodePort
  selector:
    app: delivery-tracking-system
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080    # Access via http://localhost:30080 on Docker Desktop
