apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-tracking-deployment
  labels:
    app: delivery-tracking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-tracking
  template:
    metadata:
      labels:
        app: delivery-tracking
    spec:
      containers:
      - name: delivery-tracking
        image: hakkash26/delivery-tracking-system:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-tracking-service
spec:
  type: NodePort
  selector:
    app: delivery-tracking
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30008
