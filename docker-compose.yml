version: '3.8'

services:
  delivery-app:
    build: .
    container_name: delivery-tracking-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/deliveries/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
